{% extends "base.html" %}

{% block title %}Login - Online Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body">
                <h1 class="page-title text-center mb-2">Welcome Back</h1>
                <p class="text-muted text-center mb-4">Log in to manage your cart and orders.</p>
                <form method="post" class="form-stack">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
