{% extends "base.html" %}

{% block title %}Register - Online Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="mb-4 text-center">Register</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-2">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
